plugins {
    id "com.android.application"
}

android {
    namespace "com.example.rokidgesture"
    compileSdk 36

    defaultConfig {
        applicationId "com.example.rokidgesture"
        minSdk 26
        targetSdk 36
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    androidResources {
        noCompress += ["task"]
    }
}

dependencies {
    implementation "com.google.mediapipe:tasks-vision:0.10.26"
}
